name: integrity

# This workflow runs on every change. It establishes that:
#   1. crates/<crate>/data/ matches its data/_provenance/manifest.txt
#      (no drift between the bytes on disk and what each crate's
#      manifest claims).
#   2. data/_provenance/manifest.txt matches data/_provenance/manifest.sha256
#      for every per-package crate (the digest hasn't been tampered
#      with independently of the manifest).
#   3. The MANIFEST_DIGEST const in each crate's src/lib.rs matches
#      its manifest.sha256.
#   4. tools/published.toml is in sync with the publish flags in per-crate
#      Cargo.toml files and the PUBLISHED_PACKAGES const in
#      crates/ism-data/src/lib.rs (catches hand-edits of derived state).
#   5. cargo check + cargo test pass workspace-wide (which means
#      build.rs successfully re-verified every per-crate slice at
#      consumer compile time).
#   6. The full-tree heavyweight test passes (--ignored).
#
# A weekly cron run catches situations where main has been modified
# externally since the last PR.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 12 * * 1'   # Mondays 12:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  manifest-consistency:
    name: per-crate data/ matches manifest.txt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify each manifest digest matches manifest.sha256
        run: |
          set -euo pipefail
          fail=0
          for crate in crates/*/; do
            txt="${crate}data/_provenance/manifest.txt"
            sha="${crate}data/_provenance/manifest.sha256"
            [ -f "$txt" ] || continue
            actual=$(sha256sum "$txt" | awk '{print $1}')
            expected=$(tr -d '[:space:]' < "$sha")
            if [ "$actual" != "$expected" ]; then
              echo "::error::$sha ($expected) does not match SHA-256 of $txt ($actual)"
              fail=1
            else
              echo "OK ${crate}: digest matches ($actual)"
            fi
          done
          exit $fail

      - name: Re-derive every per-crate manifest from data/ and diff
        run: python3 tools/rederive_manifest.py

      - name: Verify MANIFEST_DIGEST consts in lib.rs match
        run: |
          set -euo pipefail
          fail=0
          for crate in crates/*/; do
            sha="${crate}data/_provenance/manifest.sha256"
            lib="${crate}src/lib.rs"
            [ -f "$sha" ] && [ -f "$lib" ] || continue
            expected=$(tr -d '[:space:]' < "$sha")
            actual=$(grep -oE 'MANIFEST_DIGEST: &str = "[0-9a-f]{64}"' "$lib" | grep -oE '[0-9a-f]{64}')
            if [ "$actual" != "$expected" ]; then
              echo "::error::MANIFEST_DIGEST in $lib ($actual) does not match $sha ($expected)"
              fail=1
            fi
          done
          exit $fail

      - name: Verify tools/published.toml is in sync with derived files
        # Catches hand-edits of per-crate `publish` fields or the
        # PUBLISHED_PACKAGES marker block in ism-data/src/lib.rs.
        run: python3 tools/sync_published.py --check

  cargo-test:
    name: cargo build verifies + workspace tests pass
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo check (runs each crate's build.rs verification)
        run: cargo check --workspace --all-features

      - name: cargo test
        run: cargo test --workspace --all-features

      - name: cargo test -- --ignored (full-tree integrity per crate)
        run: cargo test --workspace --all-features -- --ignored

      - name: cargo build with verify-on-build disabled (sanity)
        # Confirm consumers can opt out cleanly.
        run: cargo check --workspace --no-default-features
